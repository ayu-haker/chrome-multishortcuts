<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 520px;
      max-height: 540px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      overflow-y: auto;
    }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #0f3460; border-radius: 3px; }
    .header {
      background: linear-gradient(135deg, #16213e, #0f3460);
      padding: 14px 18px;
      border-bottom: 2px solid #e94560;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header h1 { font-size: 16px; color: #e94560; }
    .header p { font-size: 11px; color: #aaa; margin-top: 2px; }
    .header-actions { margin-top: 8px; display: flex; gap: 6px; flex-wrap: wrap; }
    .header-actions button, .header-actions a {
      padding: 5px 12px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
      transition: 0.2s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .btn-reset { background: #e94560; color: #fff; }
    .btn-reset:hover { background: #c73650; }
    .btn-apply { background: #0f3460; color: #e0e0e0; border: 1px solid #533483 !important; }
    .btn-apply:hover { background: #1a4a7a; }
    .btn-newtab { background: #533483; color: #fff; }
    .btn-newtab:hover { background: #6b44a8; }
    .tabs {
      display: flex;
      border-bottom: 1px solid #0f3460;
      background: #16213e;
    }
    .tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      cursor: pointer;
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      transition: 0.2s;
      border-bottom: 2px solid transparent;
    }
    .tab:hover { color: #ccc; }
    .tab.active { color: #e94560; border-bottom-color: #e94560; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .list { padding: 8px; }
    .home-status {
      padding: 16px;
      text-align: center;
      color: rgba(255,255,255,0.6);
    }
    .home-status .big { font-size: 32px; margin-bottom: 8px; }
    .home-status .count { font-size: 24px; color: #6c63ff; font-weight: bold; }
    .home-status p { margin-top: 6px; font-size: 13px; }
    .home-status .open-btn {
      display: inline-block;
      margin-top: 14px;
      padding: 10px 28px;
      background: #6c63ff;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      transition: 0.2s;
      text-decoration: none;
    }
    .home-status .open-btn:hover { background: #5a52e0; }
    .shortcut-item {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 6px;
      padding: 8px 10px;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: 0.2s;
    }
    .shortcut-item:hover { border-color: #533483; }
    .shortcut-item label {
      flex: 1;
      font-size: 12px;
      color: #ccc;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .shortcut-item input {
      width: 140px;
      padding: 4px 6px;
      border: 1px solid #0f3460;
      border-radius: 4px;
      background: #1a1a2e;
      color: #e0e0e0;
      font-size: 11px;
      text-align: center;
      outline: none;
      flex-shrink: 0;
    }
    .shortcut-item input:focus { border-color: #533483; box-shadow: 0 0 0 2px rgba(83,52,131,0.3); }
    .shortcut-item .action-badge {
      font-size: 9px;
      background: #0f3460;
      color: #e94560;
      padding: 2px 6px;
      border-radius: 8px;
      min-width: 60px;
      text-align: center;
      flex-shrink: 0;
    }
    .footer {
      text-align: center;
      padding: 8px;
      font-size: 10px;
      color: #444;
      border-top: 1px solid #0f3460;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>⚡ MultiShortcuts Pro</h1>
    <p>Unlimited homepage shortcuts + 20+ keyboard shortcuts</p>
    <div class="header-actions">
      <button class="btn-apply" id="applyBtn">Apply Changes</button>
      <button class="btn-reset" id="resetBtn">Reset Defaults</button>
      <a class="btn-newtab" id="openNewTab" href="#">📂 Open New Tab</a>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" data-tab="keyboard">⌨️ Keyboard</div>
    <div class="tab" data-tab="homepage">🏠 Homepage</div>
  </div>

  <div class="tab-content active" id="tab-keyboard">
    <div class="list" id="shortcutList"></div>
  </div>

  <div class="tab-content" id="tab-homepage">
    <div class="home-status" id="homeStatus">
      <div class="big">⭐</div>
      <div>You have <span class="count" id="homeCount">0</span> homepage shortcuts</div>
      <p>No more 10-shortcut limit! Add unlimited shortcuts to your new tab page.</p>
      <a class="open-btn" id="homeOpenBtn" href="#">Open New Tab Page</a>
    </div>
  </div>

  <div class="footer">Click a key input to record — then Apply Changes</div>

  <script src="popup.js"></script>
</body>
</html>
