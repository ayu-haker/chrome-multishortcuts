<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>New Tab</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px 80px;
    }
    .time-date {
      color: #fff;
      text-align: center;
      margin-bottom: 40px;
      user-select: none;
    }
    .time {
      font-size: 64px;
      font-weight: 300;
      letter-spacing: 2px;
    }
    .date {
      font-size: 16px;
      color: rgba(255,255,255,0.6);
      margin-top: 4px;
    }
    .search-bar {
      width: 100%;
      max-width: 640px;
      margin-bottom: 40px;
      position: relative;
    }
    .search-bar input {
      width: 100%;
      padding: 14px 20px 14px 48px;
      border: 2px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      background: rgba(255,255,255,0.08);
      color: #fff;
      font-size: 16px;
      outline: none;
      transition: 0.3s;
      backdrop-filter: blur(10px);
    }
    .search-bar input::placeholder { color: rgba(255,255,255,0.4); }
    .search-bar input:focus { border-color: #6c63ff; background: rgba(255,255,255,0.12); }
    .search-bar .icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255,255,255,0.4);
      font-size: 18px;
    }
    .suggestions {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      background: #1e1e3a;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      overflow: hidden;
      display: none;
      z-index: 50;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .suggestions.active { display: block; }
    .suggestions .suggestion-item {
      padding: 10px 16px 10px 48px;
      cursor: pointer;
      color: rgba(255,255,255,0.8);
      font-size: 14px;
      transition: 0.15s;
    }
    .suggestions .suggestion-item:hover,
    .suggestions .suggestion-item.highlighted {
      background: rgba(108,99,255,0.15);
    }
    .suggestions .suggestion-item .query {
      color: #fff;
    }
    .suggestions .suggestion-item .type {
      font-size: 10px;
      color: rgba(255,255,255,0.3);
      margin-left: 8px;
    }
    .shortcuts-container {
      width: 100%;
      max-width: 800px;
    }
    .shortcuts-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .shortcuts-header h2 {
      color: rgba(255,255,255,0.8);
      font-size: 16px;
      font-weight: 500;
    }
    .add-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 2px dashed rgba(255,255,255,0.3);
      background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.6);
      font-size: 22px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.3s;
    }
    .add-btn:hover {
      border-color: #6c63ff;
      color: #6c63ff;
      background: rgba(108,99,255,0.1);
    }
    .shortcuts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 16px;
    }
    .shortcut-tile {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 16px 8px 12px;
      border-radius: 12px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      cursor: pointer;
      transition: 0.3s;
      position: relative;
      text-decoration: none;
    }
    .shortcut-tile:hover {
      background: rgba(255,255,255,0.12);
      border-color: rgba(108,99,255,0.3);
      transform: translateY(-2px);
    }
    .shortcut-tile .tile-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: rgba(108,99,255,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      color: #fff;
      overflow: hidden;
    }
    .shortcut-tile .tile-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 12px;
    }
    .shortcut-tile .tile-label {
      font-size: 11px;
      color: rgba(255,255,255,0.7);
      text-align: center;
      max-width: 80px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .shortcut-tile .delete-icon {
      position: absolute;
      top: -6px;
      right: -6px;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #e94560;
      color: #fff;
      border: 2px solid #302b63;
      font-size: 12px;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      line-height: 1;
      z-index: 5;
    }
    .shortcut-tile:hover .delete-icon {
      display: flex;
    }
    .shortcut-tile .edit-icon {
      position: absolute;
      top: -6px;
      left: -6px;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #6c63ff;
      color: #fff;
      border: 2px solid #302b63;
      font-size: 11px;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 5;
    }
    .shortcut-tile:hover .edit-icon {
      display: flex;
    }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: #1a1a2e;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 30px;
      width: 90%;
      max-width: 420px;
      color: #fff;
    }
    .modal h3 { margin-bottom: 20px; font-size: 18px; }
    .modal label { display: block; font-size: 13px; color: rgba(255,255,255,0.6); margin-bottom: 6px; }
    .modal input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      background: rgba(255,255,255,0.06);
      color: #fff;
      font-size: 14px;
      outline: none;
      margin-bottom: 16px;
      transition: 0.2s;
    }
    .modal input:focus { border-color: #6c63ff; }
    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }
    .modal-actions button {
      padding: 8px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      transition: 0.2s;
    }
    .modal-cancel { background: rgba(255,255,255,0.1); color: #ccc; }
    .modal-cancel:hover { background: rgba(255,255,255,0.15); }
    .modal-save { background: #6c63ff; color: #fff; }
    .modal-save:hover { background: #5a52e0; }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: rgba(255,255,255,0.4);
    }
    .empty-state .big-icon { font-size: 48px; margin-bottom: 16px; }
    .empty-state p { font-size: 14px; }

    .counter {
      color: rgba(255,255,255,0.4);
      font-size: 12px;
      margin-top: 20px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="time-date">
    <div class="time" id="time"></div>
    <div class="date" id="date"></div>
  </div>

  <div class="search-bar">
    <span class="icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Search Google or type a URL..." autocomplete="off">
    <div class="suggestions" id="suggestions"></div>
  </div>

  <div class="shortcuts-container">
    <div class="shortcuts-header">
      <h2>⭐ Shortcuts <span id="count"></span></h2>
      <button class="add-btn" id="addBtn" title="Add Shortcut">+</button>
    </div>
    <div class="shortcuts-grid" id="grid"></div>
    <div class="counter" id="counter"></div>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modal">
    <div class="modal">
      <h3 id="modalTitle">Add Shortcut</h3>
      <label for="modalName">Name</label>
      <input type="text" id="modalName" placeholder="e.g. Gmail">
      <label for="modalUrl">URL</label>
      <input type="text" id="modalUrl" placeholder="e.g. https://gmail.com">
      <div class="modal-actions">
        <button class="modal-cancel" id="modalCancel">Cancel</button>
        <button class="modal-save" id="modalSave">Save</button>
      </div>
    </div>
  </div>

  <script src="newtab.js"></script>
</body>
</html>
